<app-panel [label]="panelLabel">
  <div class="sector-map">

    @if (circuitCode === 'MZA') {
      <!-- ── Monza circuit outline ── -->
      <svg viewBox="0 0 320 280" class="circuit-svg" xmlns="http://www.w3.org/2000/svg">
        <!-- S1: Start/Finish → Variante del Rettifilo → Curva Grande -->
        <path
          d="M 200 240 L 240 240 L 255 235 L 260 220 L 255 205 L 240 200 L 220 200 L 200 205 L 185 215 L 175 230 L 170 245 L 168 260"
          [attr.stroke]="sectorColors[0]"
          fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        />
        <!-- S2: Curva Grande → Lesmo 1 → Lesmo 2 → Variante Ascari -->
        <path
          d="M 168 260 L 155 265 L 135 262 L 115 250 L 100 232 L 92 210 L 90 188 L 95 168 L 108 152 L 125 142 L 145 138 L 165 140 L 180 148 L 188 160 L 185 175 L 178 185 L 172 195 L 170 205"
          [attr.stroke]="sectorColors[1]"
          fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        />
        <!-- S3: Variante Ascari → Parabolica → Start/Finish -->
        <path
          d="M 170 205 L 175 195 L 185 188 L 198 185 L 212 188 L 220 198 L 220 212 L 215 222 L 205 230 L 200 240"
          [attr.stroke]="sectorColors[2]"
          fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        />

        <!-- Corner labels -->
        <text x="248" y="218" class="corner-label">S/F</text>
        <text x="152" y="258" class="corner-label">CURVA GRANDE</text>
        <text x="78"  y="195" class="corner-label">LESMO</text>
        <text x="155" y="132" class="corner-label">ASCARI</text>
        <text x="222" y="215" class="corner-label">PARABOLICA</text>

        <!-- Sector time labels -->
        <text x="255" y="195" class="sector-time-label" [attr.fill]="sectorColors[0]">
          S1 {{ currentLap ? formatSector(currentLap.sector1) : '—' }}
        </text>
        <text x="72" y="165" class="sector-time-label" [attr.fill]="sectorColors[1]">
          S2 {{ currentLap ? formatSector(currentLap.sector2) : '—' }}
        </text>
        <text x="178" y="175" class="sector-time-label" [attr.fill]="sectorColors[2]">
          S3 {{ currentLap ? formatSector(currentLap.sector3) : '—' }}
        </text>

        <!-- Start/Finish line -->
        <line x1="200" y1="233" x2="200" y2="247" stroke="#e8b800" stroke-width="2"/>
      </svg>

    } @else {
      <!-- ── Monaco circuit outline (default) ── -->
      <svg viewBox="0 0 300 260" class="circuit-svg" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M 240 200 L 260 200 L 265 180 L 260 160 L 240 150 L 220 155 L 200 165 L 185 175 L 175 185 L 170 200 L 175 215 L 185 225"
          [attr.stroke]="sectorColors[0]"
          fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        />
        <path
          d="M 185 225 L 175 235 L 155 240 L 130 235 L 110 220 L 100 200 L 100 180 L 110 165 L 125 155 L 140 150 L 155 148 L 165 145"
          [attr.stroke]="sectorColors[1]"
          fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        />
        <path
          d="M 165 145 L 175 130 L 185 115 L 195 100 L 210 90 L 225 88 L 240 90 L 252 100 L 258 115 L 255 130 L 248 145 L 245 160 L 242 175 L 240 200"
          [attr.stroke]="sectorColors[2]"
          fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        />

        <text x="255" y="195" class="corner-label">S/F</text>
        <text x="178" y="232" class="corner-label">STE DEV</text>
        <text x="88"  y="200" class="corner-label">LOEWS</text>
        <text x="160" y="138" class="corner-label">TUNNEL</text>

        <text x="230" y="175" class="sector-time-label" [attr.fill]="sectorColors[0]">
          S1 {{ currentLap ? formatSector(currentLap.sector1) : '—' }}
        </text>
        <text x="95" y="165" class="sector-time-label" [attr.fill]="sectorColors[1]">
          S2 {{ currentLap ? formatSector(currentLap.sector2) : '—' }}
        </text>
        <text x="195" y="80" class="sector-time-label" [attr.fill]="sectorColors[2]">
          S3 {{ currentLap ? formatSector(currentLap.sector3) : '—' }}
        </text>

        <line x1="240" y1="193" x2="240" y2="207" stroke="#e8b800" stroke-width="2"/>
      </svg>
    }

    <div class="legend">
      @for (item of legendItems; track item.label) {
        <div class="legend-item">
          <span class="legend-dot" [style.background]="item.color"></span>
          <span class="legend-label">{{ item.label }}</span>
        </div>
      }
    </div>
  </div>
</app-panel>
